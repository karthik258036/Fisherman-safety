<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Weather Details</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#eaf6ff;
        }

        header{
            background:#0077b6;
            color:white;
            padding:20px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-weight:bold;
        }

        .dashboard{
            min-height:80vh;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:30px;
            flex-wrap:wrap;
            padding:40px;
        }

        .card{
            width:230px;
            background:#0077b6;
            padding:35px 20px;
            border-radius:18px;
            text-align:center;
            box-shadow:0 6px 20px rgba(0,0,0,0.15);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-8px);
        }

        .card h2{
            color:white;
            margin-bottom:20px;
            font-size:24px;
        }

        .value{
            font-size:32px;
            font-weight:bold;
            color:#222;
        }
        body{

    background:#062b45;

    color:white;

    min-height:100vh;
}

    </style>

</head>

<body>

    <header>

        <div>
            <h1>WEATHER CLOUD</h1>
            <p>Live Marine Weather Dashboard</p>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="weather.html">Weather</a>
            <a href="alerts.html">Alerts</a>
            <a href="emergency.html">Emergency</a>
        </nav>

    </header>

    <section class="dashboard">

        <div class="card">

            <h2>Temperature</h2>

            <div class="value"
            id="temp">

                --°C

            </div>

        </div>

        <div class="card">

            <h2>Humidity</h2>

            <div class="value"
            id="humidity">

                --%

            </div>

        </div>

        <div class="card">

            <h2>Wind Speed</h2>

            <div class="value"
            id="wind">

                -- km/h

            </div>

        </div>

        <div class="card">

            <h2>Pressure</h2>

            <div class="value"
            id="pressure">

                -- hPa

            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
