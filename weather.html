<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Weather Details</title>

    <link rel="stylesheet"
    href="style.css">

</head>

<body>

    <header>

        <div>
            <h1>WEATHER CLOUD</h1>
            <p>Live Marine Weather Dashboard</p>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="weather.html">Weather</a>
            <a href="alerts.html">Alerts</a>
            <a href="emergency.html">Emergency</a>
        </nav>

    </header>

    <section class="dashboard">

        <div class="card">

            <h2>Temperature</h2>

            <div class="value"
            id="temp">

                --°C

            </div>

        </div>

        <div class="card">

            <h2>Humidity</h2>

            <div class="value"
            id="humidity">

                --%

            </div>

        </div>

        <div class="card">

            <h2>Wind Speed</h2>

            <div class="value"
            id="wind">

                -- km/h

            </div>

        </div>

        <div class="card">

            <h2>Pressure</h2>

            <div class="value"
            id="pressure">

                -- hPa

            </div>

        </div>

    </section>

    <section class="forecast">

        <div class="forecast-card">

            <h3>Sea Condition</h3>

            <p>Moderate Waves</p>

        </div>

        <div class="forecast-card">

            <h3>Rain Chance</h3>

            <p>20%</p>

        </div>

        <div class="forecast-card">

            <h3>Visibility</h3>

            <p>8 KM</p>

        </div>

        <div class="forecast-card">

            <h3>UV Index</h3>

            <p>5 Moderate</p>

        </div>

    </section>



    <script src="script.js"></script>

</body>

</html>
